name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.detect.outputs.src_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect src changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: building regardless of changed paths."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            echo "No usable base SHA; building to stay safe."
            exit 0
          fi

          if ! git cat-file -e "$base^{commit}" 2>/dev/null || ! git cat-file -e "$head^{commit}" 2>/dev/null; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            echo "Could not resolve base/head commits locally; building to stay safe."
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head" -- src)"
          if [[ -n "$changed_files" ]]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed src files:"
            echo "$changed_files"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
            echo "No src changes detected; build and publish jobs will be skipped."
          fi

  build-and-test:
    needs: changes
    if: needs.changes.outputs.src_changed == 'true'
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        framework: [net10.0]
        dotnet: ["10.0.x"]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Compute Version
        id: set-version
        run: |
          VERSION="0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore JKToolKit.CodexSDK.sln

      - name: Verify Generated DTOs
        run: dotnet run --project src/JKToolKit.CodexSDK.UpstreamGen --configuration Release --no-restore -- check

      - name: Build
        run: dotnet build JKToolKit.CodexSDK.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test JKToolKit.CodexSDK.sln --configuration Release --no-build --framework ${{ matrix.framework }} --logger \"trx;LogFileName=test-results.trx\"

      - name: Prepare NuGet README
        if: matrix.os == 'ubuntu-latest'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/JKToolKit.CodexSDK/README.md")
          lines = path.read_text(encoding="utf-8").splitlines()
          out = []
          for line in lines:
            stripped = line.strip()
            if stripped.startswith("<br"):
              continue
            if line.startswith("# <img"):
              out.append("# JKToolKit.CodexSDK")
              continue
            out.append(line)

          path.write_text("\n".join(out) + "\n", encoding="utf-8")
          print(f"Rewrote {path.as_posix()} for NuGet packaging")
          PY

      - name: Pack NuGet Packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/JKToolKit.CodexSDK/JKToolKit.CodexSDK.csproj --configuration Release --no-build --output nuget-packages /p:Version="${{ env.VERSION }}"
          dotnet pack src/JKToolKit.CodexSDK.SemanticKernel/JKToolKit.CodexSDK.SemanticKernel.csproj --configuration Release --no-build --output nuget-packages /p:Version="${{ env.VERSION }}"
          test -f "nuget-packages/JKToolKit.CodexSDK.${{ env.VERSION }}.nupkg"
          test -f "nuget-packages/JKToolKit.CodexSDK.SemanticKernel.${{ env.VERSION }}.nupkg"

      - name: Upload NuGet Package Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nuget-packages/*.nupkg

  NugetUpload:
    needs: [changes, build-and-test]
    if: github.event_name == 'push' && needs.changes.outputs.src_changed == 'true' && needs.build-and-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - name: Download NuGet Packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-package
        path: nuget-packages

    - name: Get Secrets
      uses: bitwarden/sm-action@v2
      with:
        access_token: ${{ secrets.BW_ACCESS_TOKEN }}
        base_url: https://vault.bitwarden.eu
        secrets: |
          265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

    - name: Upload to NuGet.org
      run: |
        for package in nuget-packages/*.nupkg; do
          dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        done
        echo "Version: ${{ needs.build-and-test.outputs.version }}"
