name: Codex SDK Parity Repair Dispatch

on:
  workflow_run:
    workflows: ["Codex SDK Parity Pass", "Upstream Sync (@openai/codex)"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  dispatch-repair:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.repository.id == github.repository_id &&
      !github.event.workflow_run.repository.fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dispatcher script
        uses: actions/checkout@v4

      - name: Dispatch bounded parity repair
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PARITY_WORKFLOW_FILE: codex-sdk-parity-pass.lock.yml
          MAX_REPAIR_ATTEMPTS: "3"
        run: python .github/scripts/dispatch_parity_repair.py
